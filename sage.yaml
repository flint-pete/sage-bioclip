name: "bioclip-species-classifier"
namespace: "waggle"
version: "0.3.0"
description: "BioCLIP 2.5 Huge species classifier — identifies organisms at any taxonomic rank (Kingdom through Species) from camera images using the ViT-H/14 BioCLIP 2.5 model trained on TreeOfLife-200M (219M+ images, 450K+ species)."
authors: "Pete Beckman"
collaborators: "Sage Team"
funding: "NSF 2436842"
license: "BSD 3-clause"
keywords: "species classification, biodiversity, BioCLIP, BioCLIP2, BioCLIP 2.5, ViT-H, ecology, camera, taxonomy, wildlife, conservation, zero-shot classification, TreeOfLife, hummingbird, image annotation, vision-language model"
homepage: "https://github.com/flint-pete/sage-bioclip"
source:
    architectures:
        - "linux/arm64"
        # - "linux/amd64"  # disabled: QEMU crashes on NVIDIA base image during cross-build
    url: "https://github.com/flint-pete/sage-bioclip.git"
    branch: "main"
inputs:
    - id: "stream"
      type: "string"
      description: "Camera stream name (e.g. bottom_camera) or RTSP URL"
    - id: "image-dir"
      type: "string"
      description: "Directory of test images for local batch testing (replaces --stream)"
    - id: "snapshot-url"
      type: "string"
      description: "HTTP URL that returns a JPEG snapshot (e.g. Reolink CGI API). Overrides --stream. Credentials go in the URL query string."
    - id: "rank"
      type: "string"
      description: "Taxonomic rank for classification: Kingdom, Phylum, Class, Order, Family, Genus, or Species (default: Class)"
    - id: "model"
      type: "string"
      description: "BioCLIP model string (default: hf-hub:imageomics/bioclip-2.5-vith14)"
    - id: "interval"
      type: "int"
      description: "Seconds between captures (default: 60)"
    - id: "min-confidence"
      type: "string"
      description: "Minimum confidence score to publish a prediction (default: 0.1). Flag accepts a float value."
    - id: "top-k"
      type: "string"
      description: "Number of top predictions to publish per frame (default: 5). Flag accepts an integer value."
    - id: "continuous"
      type: "string"
      description: "Y = continuous loop (default), N = single-shot classification"
resources:
    - type: "RGB_image_producer"
      view: "ground"
      min_resolution: "640x480"
metadata:
    ontology: env.species.*
testing:
    mask_entrypoint: true
    command: ["python3", "tests/test_bioclip_local.py"]
