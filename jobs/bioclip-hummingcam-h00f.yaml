# ──────────────────────────────────────────────────────────────
# BioCLIP Species Classifier — H00F hummingbird cam (WINDOWED continuous)
#
# GPU-SHARING MODE. Thor has ONE GPU; two always-on continuous plugins cannot
# co-run (a held GPU blocks the second pod entirely). So instead of holding the
# GPU 24/7, this job runs a bounded 10-minute window once an hour: a cron starts
# it at :20, and the plugin self-exits after --max-runtime 600s, classifying
# every 15s (~40 frames/window). YOLO takes the :00 window; BioCLIP takes :20.
# Together they use ~20 min/hour (~1/3 of the GPU).
#
# Window layout (with guard-bands so neither can bleed into the other):
#   :00–:10  YOLO     (jobs/yolo-hummingcam-h00f.yaml)
#   :10–:20  guard
#   :20–:30  BioCLIP  (this job)
#   :30–:00  guard
#
# Mechanism: --continuous Y + --max-runtime 600 makes the plugin behave like one
# long 10-min single-shot — it loops every --interval seconds, then self-exits
# at the end of the window (frees GPU). Needs bioclip-species-classifier >= 0.3.2.
#
# Within the window the ~28 GB BioCLIP 2.5 model loads ONCE and stays warm for
# all 40 classifications (vs a one-shot cron that reloads it every cycle).
#
# CONFIDENCE: --min-confidence 0.7 — report only HIGH-confidence species. BioCLIP
# has no "reject" class and can score confidently on empty frames, so a high bar
# suppresses most of that noise. (System-level species gating still belongs in
# the slack-hummingbird watcher; see that project.)
#
# Image: ECR app beckman/bioclip-species-classifier:0.3.2 (BioCLIP 2.5 ViT-H/14)
# Camera: Reolink RLC-811A snapshot CGI (creds as query params).
#
# Submit (with a write-scoped token):
#   sesctl --server https://es.sagecontinuum.org --token "$SES_USER_TOKEN" create -f jobs/bioclip-hummingcam-h00f.yaml
#   sesctl ... submit -j <returned-id>
#
# For an always-on variant or a plain one-shot cron, see
# jobs/bioclip-hummingcam-h00f-oneshot.yaml and git history.
# ──────────────────────────────────────────────────────────────
name: bioclip-hummingcam
plugins:
  - name: bioclip-species-classifier
    pluginSpec:
      image: registry.sagecontinuum.org/beckman/bioclip-species-classifier:0.3.3
      args:
        - "--snapshot-url"
        - "http://10.107.0.221:10000/cgi-bin/api.cgi?cmd=Snap&channel=0&rs=snap&user=sage&password=SageCam!&width=640&height=360"
        - "--rank"
        - "Species"
        - "--min-confidence"
        - "0.7"
        - "--top-k"
        - "5"
        - "--continuous"
        - "Y"
        - "--interval"
        - "15"
        - "--max-runtime"
        - "600"
      selector:
        resource.gpu: "true"
nodes:
  H00F: true
scienceRules:
  # Start the 10-min window at :20 each hour — offset from YOLO's :00 window with
  # a 10-min guard-band so the two never contend for the single GPU. The plugin's
  # --max-runtime 600 self-exits ~:30, freeing the GPU for the rest of the hour.
  - "schedule(bioclip-species-classifier): cronjob('bioclip-hummingcam-window', '20 * * * *')"
successcriteria:
  - WallClock('30day')
